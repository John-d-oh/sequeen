    <!-- Type system:
           Inter           — body / UI
           JetBrains Mono  — labels / numerics (replaces IBM Plex Mono)
           Space Grotesk   — display / brand (italic 700 for the wordmark)

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:ital,wght@0,500;0,600;0,700;1,700&display=swap"
      rel="stylesheet"
    />
